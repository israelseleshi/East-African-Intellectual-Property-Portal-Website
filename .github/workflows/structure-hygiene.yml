name: Structure Hygiene

on:
  push:
  pull_request:

jobs:
  audit-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Root Dependencies
        run: npm ci

      - name: Run Structure Audit
        run: npm run audit:structure
