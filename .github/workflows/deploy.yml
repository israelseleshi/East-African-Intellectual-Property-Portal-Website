name: Deploy to A2 Hosting
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd client && npm ci && npm run build && cd ..

      - name: Build backend
        run: |
          cd server && npm ci && npm run build && cd ..

      - name: Prepare backend folder
        run: |
          mkdir -p deploy_backend
          cp -r server/dist/* deploy_backend/
          cp server/package.json deploy_backend/
          if [ -f server.js.temp ]; then cp server.js.temp deploy_backend/server.js; fi
          if [ -f scripts/deployment/server.htaccess ]; then cp scripts/deployment/server.htaccess deploy_backend/.htaccess; fi
          mkdir -p deploy_backend/tmp && touch deploy_backend/tmp/restart.txt

      - name: FTP Upload frontend
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: client/dist/
          server-dir: /eastafricanip.com/
          dangerous-cleanup: false

      - name: FTP Upload backend
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: deploy_backend/
          server-dir: /eastafricanip.com/api/
          dangerous-cleanup: false
