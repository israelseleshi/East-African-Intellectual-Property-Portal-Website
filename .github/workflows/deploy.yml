name: Deploy to A2 Hosting
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd client && npm ci && npm run build && cd ..

      - name: Build backend
        run: |
          cd server && npm ci && npm run build && cd ..

      - name: Package frontend
        run: |
          cd client/dist
          zip -r ../../frontend.zip . -x "uploads/*" "forms-upload/*"
          cd ../..
          if [ -f client/public/.htaccess ]; then
            cd client/dist && zip -u ../../frontend.zip .htaccess && cd ../..
          fi

      - name: Package backend
        run: |
          cp server/package.json server/dist/package.json
          if [ -f server.js.temp ]; then cp server.js.temp server/dist/server.js; fi
          if [ -f scripts/deployment/server.htaccess ]; then
            cp scripts/deployment/server.htaccess server/dist/.htaccess
          fi
          cd server/dist
          zip -r ../../backend.zip . -x "uploads/*" "forms-upload/*"
          cd ../..

      - name: Setup SSH key
        run: |
          printf '%s\n' "${{ secrets.A2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Remove Windows CRLF line endings that break SSH
          sed -i 's/\r$//' /tmp/deploy_key
          # Verify key format
          head -1 /tmp/deploy_key
          tail -1 /tmp/deploy_key

      - name: Test SSH connection
        run: |
          ssh -i /tmp/deploy_key -p ${{ secrets.A2_PORT }} -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.A2_USER }}@${{ secrets.A2_HOST }} "echo SSH connection successful"

      - name: Upload frontend
        run: scp -i /tmp/deploy_key -P ${{ secrets.A2_PORT }} -o StrictHostKeyChecking=no frontend.zip ${{ secrets.A2_USER }}@${{ secrets.A2_HOST }}:${{ secrets.A2_FRONTEND_DEPLOY_PATH }}/

      - name: Upload backend
        run: scp -i /tmp/deploy_key -P ${{ secrets.A2_PORT }} -o StrictHostKeyChecking=no backend.zip ${{ secrets.A2_USER }}@${{ secrets.A2_HOST }}:${{ secrets.A2_BACKEND_DEPLOY_PATH }}/

      - name: Apply remote changes
        run: |
          ssh -i /tmp/deploy_key -p ${{ secrets.A2_PORT }} -o StrictHostKeyChecking=no ${{ secrets.A2_USER }}@${{ secrets.A2_HOST }} "
            cd ${{ secrets.A2_FRONTEND_DEPLOY_PATH }} && unzip -o frontend.zip && rm -f frontend.zip &&
            cd ${{ secrets.A2_BACKEND_DEPLOY_PATH }} &&
            if [ -d uploads ]; then mv uploads ../uploads_backup; fi &&
            if [ -d forms-upload ]; then mv forms-upload ../forms-upload_backup; fi &&
            unzip -o backend.zip &&
            if [ -d ../uploads_backup ]; then mv ../uploads_backup uploads; fi &&
            if [ -d ../forms-upload_backup ]; then mv ../forms-upload_backup forms-upload; fi &&
            mkdir -p uploads/marks forms-upload && rm -f backend.zip &&
            mkdir -p tmp && touch tmp/restart.txt
          "
