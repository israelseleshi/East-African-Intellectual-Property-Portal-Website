<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>East African IP — TPMS</title>
    <link id="favicon" rel="icon" type="image/png" href="/eaip-logo.png" />
    <link rel="apple-touch-icon" href="/eaip-logo.png" />
    <script>
      function updateFavicon() {
        const favicon = document.getElementById('favicon');
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (isDark) {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const img = new Image();
          img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
              // Simple invert for dark mode (white logo)
              data[i] = 255;
              data[i+1] = 255;
              data[i+2] = 255;
            }
            ctx.putImageData(imageData, 0, 0);
            favicon.href = canvas.toDataURL();
          };
          img.src = '/eaip-logo.png';
        } else {
          favicon.href = '/eaip-logo.png';
        }
      }
      
      updateFavicon();
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
